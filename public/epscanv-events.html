<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPscanV - Scanner Events</title>
    <script src="/env-config.js"></script>
    <link rel="icon" type="image/png" href="/evenpass-icon-512.png">
    <link rel="apple-touch-icon" href="/evenpass-icon-512.png">
    <meta name="theme-color" content="#F97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EPscanV Events">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0F172A;
            color: white;
            min-height: 100vh;
            overflow: hidden;
        }

        .events-header {
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
        }

        .event-info {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .controller-info {
            font-size: 13px;
            opacity: 0.9;
        }

        .mode-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            text-transform: uppercase;
        }

        #scanner-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 280px);
            background: #1E293B;
            overflow: hidden;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 3px solid #F97316;
            border-radius: 20px;
            pointer-events: none;
            box-shadow: 0 0 0 99999px rgba(15, 23, 42, 0.7);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #F97316, transparent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }

        .scan-corners {
            position: absolute;
            inset: -3px;
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #F97316;
        }

        .corner.top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            border-radius: 20px 0 0 0;
        }

        .corner.top-right {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
            border-radius: 0 20px 0 0;
        }

        .corner.bottom-left {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 20px;
        }

        .corner.bottom-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            border-radius: 0 0 20px 0;
        }

        .start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(249, 115, 22, 0.4);
            z-index: 10;
            display: none;
        }

        .start-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .stats-container {
            background: #1E293B;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #F97316;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-content {
            background: #1E293B;
            border-radius: 20px;
            padding: 30px;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .result-icon.success {
            background: rgba(34, 197, 94, 0.2);
            border: 3px solid #22C55E;
        }

        .result-icon.error {
            background: rgba(239, 68, 68, 0.2);
            border: 3px solid #EF4444;
        }

        .result-icon.warning {
            background: rgba(255, 193, 7, 0.2);
            border: 3px solid #FFC107;
        }

        .result-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .result-message {
            font-size: 16px;
            color: #94A3B8;
            margin-bottom: 24px;
        }

        .result-details {
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .detail-label {
            color: #94A3B8;
        }

        .detail-value {
            color: white;
            font-weight: 600;
        }

        .result-button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="events-header">
        <div class="event-info" id="eventInfo">Chargement...</div>
        <div class="controller-info" id="controllerInfo"></div>
        <div class="mode-badge">🎟️ EVENTS</div>
    </div>

    <div id="scanner-container">
        <div id="reader"></div>
        <div class="scan-overlay">
            <div class="scan-line"></div>
            <div class="scan-corners">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </div>
        </div>
        <button class="start-button" id="startButton">🎟️ DÉMARRER LE SCAN</button>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-value" id="validCount">0</div>
            <div class="stat-label">Scannés</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="invalidCount">0</div>
            <div class="stat-label">Refusés</div>
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-details" id="resultDetails" style="display: none;"></div>
            <button class="result-button" id="continueButton">Continuer</button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js';
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js';
        import { getDatabase, ref as dbRef, get as rtdbGet, update as rtdbUpdate } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: window.__FIREBASE_CONFIG__?.apiKey || "AIzaSyDR_yRI2ZLCSfyf3DQ_BXEie_2PzE8F0sk",
            authDomain: window.__FIREBASE_CONFIG__?.authDomain || "evenpass-2b39c.firebaseapp.com",
            databaseURL: window.__FIREBASE_CONFIG__?.databaseURL || "https://evenpass-2b39c-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: window.__FIREBASE_CONFIG__?.projectId || "evenpass-2b39c",
            storageBucket: window.__FIREBASE_CONFIG__?.storageBucket || "evenpass-2b39c.firebasestorage.app",
            messagingSenderId: window.__FIREBASE_CONFIG__?.messagingSenderId || "964478366450",
            appId: window.__FIREBASE_CONFIG__?.appId || "1:964478366450:web:2aa533bc2fe41dcd78005a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const eventName = sessionStorage.getItem('event_name') || 'Événement';
        const eventId = sessionStorage.getItem('event_id') || '';
        const controllerName = sessionStorage.getItem('controller_name') || 'Contrôleur';
        const controllerPosition = sessionStorage.getItem('controller_position') || '';
        const controllerType = sessionStorage.getItem('controller_type') || '';

        if (!eventName || !controllerName) {
            window.location.href = '/controller-login.html';
        }

        document.getElementById('eventInfo').textContent = eventName;
        document.getElementById('controllerInfo').textContent = `${controllerName}${controllerPosition ? ' - ' + controllerPosition : ''}`;

        let validCount = 0;
        let invalidCount = 0;
        let html5QrCode;
        let isProcessing = false;

        function showResult(type, title, message, details = null) {
            const modal = document.getElementById('resultModal');
            const icon = document.getElementById('resultIcon');
            const titleEl = document.getElementById('resultTitle');
            const messageEl = document.getElementById('resultMessage');
            const detailsEl = document.getElementById('resultDetails');

            icon.className = `result-icon ${type}`;
            icon.textContent = type === 'success' ? '✓' : type === 'warning' ? '⚠' : '✗';
            titleEl.textContent = title;
            titleEl.style.color = type === 'success' ? '#22C55E' : type === 'warning' ? '#FFC107' : '#EF4444';
            messageEl.textContent = message;

            if (details) {
                detailsEl.innerHTML = details;
                detailsEl.style.display = 'block';
            } else {
                detailsEl.style.display = 'none';
            }

            modal.style.display = 'flex';

            if (type === 'success') {
                validCount++;
                document.getElementById('validCount').textContent = validCount;
            } else {
                invalidCount++;
                document.getElementById('invalidCount').textContent = invalidCount;
            }

            navigator.vibrate && navigator.vibrate(type === 'success' ? [100] : [200, 100, 200]);
        }

        document.getElementById('continueButton').addEventListener('click', () => {
            document.getElementById('resultModal').style.display = 'none';
            isProcessing = false;
        });

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                if (controllerType === 'ops_events') {
                    const ticketRef = dbRef(rtdb, `opsEvents/tickets/${decodedText}`);
                    const snapshot = await rtdbGet(ticketRef);

                    if (!snapshot.exists()) {
                        showResult('error', 'Billet Invalide', 'Ce billet n\'existe pas');
                        return;
                    }

                    const ticket = snapshot.val();

                    if (ticket.eventId !== eventId) {
                        showResult('error', 'Mauvais Événement', 'Ce billet n\'est pas pour cet événement');
                        return;
                    }

                    if (ticket.scanned) {
                        const scannedDate = new Date(ticket.scannedAt).toLocaleString('fr-FR');
                        showResult('warning', 'Déjà Scanné', `Scanné le ${scannedDate} par ${ticket.scannedBy}`);
                        return;
                    }

                    const details = `
                        <div class="detail-row">
                            <span class="detail-label">Nom:</span>
                            <span class="detail-value">${ticket.buyerName || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value">${ticket.buyerEmail || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Téléphone:</span>
                            <span class="detail-value">${ticket.buyerPhone || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Catégorie:</span>
                            <span class="detail-value">${ticket.category || 'Standard'}</span>
                        </div>
                    `;

                    await rtdbUpdate(ticketRef, {
                        scanned: true,
                        scannedAt: new Date().toISOString(),
                        scannedBy: controllerName
                    });

                    showResult('success', 'Billet Valide', `Bienvenue ${ticket.buyerName || ''}`, details);
                } else {
                    const ticketRef = doc(db, 'tickets', decodedText);
                    const snapshot = await getDoc(ticketRef);

                    if (!snapshot.exists()) {
                        showResult('error', 'Billet Invalide', 'Ce billet n\'existe pas');
                        return;
                    }

                    const ticket = snapshot.data();

                    if (ticket.eventId !== eventId) {
                        showResult('error', 'Mauvais Événement', 'Ce billet n\'est pas pour cet événement');
                        return;
                    }

                    if (ticket.scanned) {
                        const scannedDate = new Date(ticket.scannedAt).toLocaleString('fr-FR');
                        showResult('warning', 'Déjà Scanné', `Scanné le ${scannedDate} par ${ticket.scannedBy}`);
                        return;
                    }

                    const details = `
                        <div class="detail-row">
                            <span class="detail-label">Nom:</span>
                            <span class="detail-value">${ticket.buyerName || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Email:</span>
                            <span class="detail-value">${ticket.buyerEmail || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Téléphone:</span>
                            <span class="detail-value">${ticket.buyerPhone || 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Catégorie:</span>
                            <span class="detail-value">${ticket.category || 'Standard'}</span>
                        </div>
                    `;

                    await updateDoc(ticketRef, {
                        scanned: true,
                        scannedAt: new Date().toISOString(),
                        scannedBy: controllerName
                    });

                    showResult('success', 'Billet Valide', `Bienvenue ${ticket.buyerName || ''}`, details);
                }
            } catch (error) {
                console.error('[EPscanV Events] Scan error:', error);
                showResult('error', 'Erreur', 'Impossible de vérifier ce billet');
            }
        }

        async function startScanner() {
            try {
                html5QrCode = new Html5Qrcode("reader");

                await html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess
                );

                document.getElementById('startButton').style.display = 'none';
                console.log('[EPscanV Events] ✅ Scanner started');
            } catch (err) {
                console.error('[EPscanV Events] ❌ Camera error:', err);
                document.getElementById('startButton').style.display = 'block';
                document.getElementById('startButton').textContent = '📷 ACTIVER LA CAMÉRA';
            }
        }

        document.getElementById('startButton').addEventListener('click', startScanner);

        setTimeout(() => {
            startScanner();
        }, 500);

        console.log('[EPscanV Events] Ready for', eventName);
    </script>
</body>
</html>
