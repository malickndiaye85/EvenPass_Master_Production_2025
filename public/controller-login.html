<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPscanV - Contrôleur Transport</title>
    <link rel="manifest" href="/manifest-epscanv.json">
    <meta name="theme-color" content="#10B981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EPscanV">
    <link rel="apple-touch-icon" href="/assets/logo_EPscanV_pwa.svg">
    <link rel="icon" href="/assets/logo_EPscanV_pwa.svg">
    <script src="/env-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        .login-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid #334155;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            color: white;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .code-input {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 8px;
            background: #0f172a;
            border: 3px solid #334155;
            border-radius: 16px;
            color: white;
            transition: all 0.3s;
            outline: none;
        }

        .code-input:focus {
            border-color: #F97316;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.2);
        }

        .code-input::placeholder {
            color: #475569;
            letter-spacing: 8px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 900;
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(249, 115, 22, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid rgba(239, 68, 68, 0.5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
            color: #fca5a5;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }

        .numeric-hint {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="logo">
                    <img src="/assets/logo_EPscanV_pwa.svg" alt="EPscanV" style="width: 100%; height: 100%; object-fit: contain; border-radius: 20px;">
                </div>
                <h1>EPscanV Contrôle</h1>
                <p class="subtitle">Entrez votre code d'accès à 6 chiffres</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="login-form">
                <div class="input-group">
                    <label for="access-code">Code d'Accès</label>
                    <input
                        type="text"
                        id="access-code"
                        class="code-input"
                        placeholder="000000"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        maxlength="6"
                        autocomplete="off"
                        required
                    />
                    <p class="numeric-hint">Le code se compose de 6 chiffres</p>
                </div>

                <button type="submit" id="submit-btn" class="btn">
                    VALIDER
                </button>
            </form>

            <p class="info-text">
                Code fourni par l'Ops Manager
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: window.ENV.FIREBASE_API_KEY,
            authDomain: window.ENV.FIREBASE_AUTH_DOMAIN,
            databaseURL: window.ENV.FIREBASE_DATABASE_URL,
            projectId: window.ENV.FIREBASE_PROJECT_ID,
            storageBucket: window.ENV.FIREBASE_STORAGE_BUCKET,
            messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
            appId: window.ENV.FIREBASE_APP_ID
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const codeInput = document.getElementById('access-code');
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        // Format code avec espace au milieu (123 456)
        codeInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 6) value = value.slice(0, 6);

            if (value.length > 3) {
                e.target.value = value.slice(0, 3) + ' ' + value.slice(3);
            } else {
                e.target.value = value;
            }

            // Auto-submit quand 6 chiffres
            if (value.length === 6) {
                setTimeout(() => form.requestSubmit(), 300);
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const rawCode = codeInput.value.replace(/\s/g, '');

            if (rawCode.length !== 6) {
                showError('Le code doit contenir 6 chiffres');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'VÉRIFICATION...';

            try {
                const accessCodesRef = collection(db, 'access_codes');
                const accessQuery = query(accessCodesRef,
                    where('code', '==', rawCode),
                    where('isActive', '==', true)
                );
                const accessSnapshot = await getDocs(accessQuery);

                if (!accessSnapshot.empty) {
                    const codeData = accessSnapshot.docs[0].data();
                    sessionStorage.setItem('controller_code', rawCode);
                    sessionStorage.setItem('controller_type', codeData.type);
                    sessionStorage.setItem('vehicle_id', codeData.vehicleId || '');
                    sessionStorage.setItem('vehicle_plate', codeData.vehiclePlate || '');
                    sessionStorage.setItem('staff_name', codeData.staffName || '');
                    sessionStorage.setItem('staff_role', codeData.staffRole || '');
                    window.location.href = '/controller-epscanv';
                    return;
                }

                const evenCodesRef = collection(db, 'agent_access_codes');
                const evenQuery = query(evenCodesRef,
                    where('access_code', '==', rawCode),
                    where('is_active', '==', true)
                );
                const evenSnapshot = await getDocs(evenQuery);

                if (!evenSnapshot.empty) {
                    const codeData = evenSnapshot.docs[0].data();
                    sessionStorage.setItem('controller_code', rawCode);
                    sessionStorage.setItem('controller_id', codeData.agent_id);
                    sessionStorage.setItem('controller_name', codeData.agent_name);
                    sessionStorage.setItem('event_id', codeData.event_id);
                    sessionStorage.setItem('controller_type', 'even');
                    window.location.href = '/scanner.html';
                    return;
                }

                const passCodesRef = collection(db, 'maritime_access_codes');
                const passQuery = query(passCodesRef,
                    where('access_code', '==', rawCode),
                    where('is_active', '==', true)
                );
                const passSnapshot = await getDocs(passQuery);

                if (!passSnapshot.empty) {
                    const codeData = passSnapshot.docs[0].data();
                    sessionStorage.setItem('controller_code', rawCode);
                    sessionStorage.setItem('controller_id', codeData.controller_id);
                    sessionStorage.setItem('controller_name', codeData.controller_name);
                    sessionStorage.setItem('vessel_id', codeData.vessel_id);
                    sessionStorage.setItem('controller_type', 'pass');
                    window.location.href = '/epscan-plus.html';
                    return;
                }

                showError('Code invalide ou inactif');
            } catch (error) {
                console.error('Error:', error);
                showError('Erreur de connexion. Réessayez.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'VALIDER';
            }
        });

        // Focus automatique
        codeInput.focus();

        // Enregistrer le Service Worker dédié EPscanV
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw-epscanv.js')
                .then(reg => console.log('[EPscanV] Service Worker registered:', reg))
                .catch(err => console.error('[EPscanV] Service Worker registration failed:', err));
        }

        // Détection et prompt d'installation PWA
        let deferredPrompt;
        const pwaInstallBanner = createInstallBanner();

        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('[EPscanV] beforeinstallprompt event fired');
            e.preventDefault();
            deferredPrompt = e;

            // Vérifier si déjà installé ou si l'utilisateur a refusé
            if (!localStorage.getItem('epscanv_pwa_dismissed')) {
                showInstallBanner();
            }
        });

        function createInstallBanner() {
            const banner = document.createElement('div');
            banner.id = 'pwa-install-banner';
            banner.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 20px;
                right: 20px;
                background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
                color: white;
                padding: 20px;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(249, 115, 22, 0.5);
                display: none;
                z-index: 9999;
                animation: slideUp 0.3s ease-out;
            `;

            banner.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="flex-shrink: 0; width: 50px; height: 50px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#F97316"/>
                            <path d="M2 17L12 22L22 17" stroke="#F97316" stroke-width="2"/>
                            <path d="M2 12L12 17L22 12" stroke="#F97316" stroke-width="2"/>
                        </svg>
                    </div>
                    <div style="flex: 1;">
                        <div style="font-weight: 900; font-size: 16px; margin-bottom: 4px;">Installer EPscanV</div>
                        <div style="font-size: 13px; opacity: 0.9;">Accès rapide et utilisation hors ligne</div>
                    </div>
                    <button id="pwa-install-btn" style="background: white; color: #F97316; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 900; font-size: 14px; cursor: pointer;">
                        INSTALLER
                    </button>
                    <button id="pwa-dismiss-btn" style="background: transparent; color: white; border: 2px solid rgba(255,255,255,0.3); padding: 12px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-left: 8px;">
                        ✕
                    </button>
                </div>
            `;

            document.body.appendChild(banner);

            banner.querySelector('#pwa-install-btn').addEventListener('click', installPWA);
            banner.querySelector('#pwa-dismiss-btn').addEventListener('click', dismissBanner);

            return banner;
        }

        function showInstallBanner() {
            pwaInstallBanner.style.display = 'block';
        }

        function dismissBanner() {
            pwaInstallBanner.style.display = 'none';
            localStorage.setItem('epscanv_pwa_dismissed', 'true');
        }

        async function installPWA() {
            if (!deferredPrompt) {
                console.log('[EPscanV] Installation prompt not available');
                return;
            }

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;

            console.log(`[EPscanV] User choice: ${outcome}`);

            if (outcome === 'accepted') {
                console.log('[EPscanV] PWA installed successfully');
                localStorage.setItem('epscanv_pwa_installed', 'true');
            } else {
                localStorage.setItem('epscanv_pwa_dismissed', 'true');
            }

            pwaInstallBanner.style.display = 'none';
            deferredPrompt = null;
        }

        window.addEventListener('appinstalled', () => {
            console.log('[EPscanV] PWA was installed');
            localStorage.setItem('epscanv_pwa_installed', 'true');
            pwaInstallBanner.style.display = 'none';
        });

        // Vérifier si l'app est déjà installée
        if (window.matchMedia('(display-mode: standalone)').matches) {
            console.log('[EPscanV] App is running in standalone mode');
        }
    </script>
</body>
</html>
