<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPscanV - Contrôleur Events</title>
    <script src="/env-config.js"></script>
    <link rel="icon" type="image/png" href="/evenpass-icon-512.png">
    <meta name="theme-color" content="#F97316">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #F97316;
        }

        .subtitle {
            font-size: 14px;
            color: #94A3B8;
        }

        .badge {
            display: inline-block;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: #F97316;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(249, 115, 22, 0.2);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #CBD5E1;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(249, 115, 22, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #F97316;
            background: rgba(0, 0, 0, 0.5);
        }

        input::placeholder {
            color: #475569;
            letter-spacing: normal;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #F97316 0%, #EF4444 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #FCA5A5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748B;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="/evenpass-icon-512.png" alt="EPscanV Events">
            </div>
            <div class="badge">🎟️ EVENTS</div>
            <h1>Contrôleur Events</h1>
            <p class="subtitle">Scanner de billets d'événements</p>
        </div>

        <div class="card">
            <div id="errorMessage" class="error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="codeInput">Code à 6 chiffres</label>
                    <input
                        type="text"
                        id="codeInput"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        maxlength="6"
                        placeholder="000000"
                        autocomplete="off"
                        required
                    >
                </div>

                <button type="submit" id="submitBtn">
                    VÉRIFIER
                </button>
            </form>

            <p class="info-text">
                Code d'accès fourni par l'OPS Manager Events
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js';
        import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js';
        import { getDatabase, ref as dbRef, query as rtdbQuery, orderByChild, equalTo, get as rtdbGet } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js';

        const codeInput = document.getElementById('codeInput');
        const submitBtn = document.getElementById('submitBtn');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        if (!window.__FIREBASE_CONFIG__) {
            console.error('[EPscanV Events] ❌ Firebase config not loaded');
            showError('Configuration manquante. Rechargez la page.');
            submitBtn.disabled = true;
        }

        const firebaseConfig = {
            apiKey: window.__FIREBASE_CONFIG__?.apiKey || "AIzaSyDPsWVCA_Czs64wxiBOqUCSWwbkLMPNjJo",
            authDomain: window.__FIREBASE_CONFIG__?.authDomain || "evenpasssenegal.firebaseapp.com",
            databaseURL: window.__FIREBASE_CONFIG__?.databaseURL || "https://evenpasssenegal-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: window.__FIREBASE_CONFIG__?.projectId || "evenpasssenegal",
            storageBucket: window.__FIREBASE_CONFIG__?.storageBucket || "evenpasssenegal.firebasestorage.app",
            messagingSenderId: window.__FIREBASE_CONFIG__?.messagingSenderId || "882782977052",
            appId: window.__FIREBASE_CONFIG__?.appId || "1:882782977052:web:1f2ea147010066017cf3d9"
        };

        console.log('[EPscanV Events] Firebase config:', firebaseConfig.projectId);

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        console.log('[EPscanV Events] Firebase initialized');

        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const rawCode = codeInput.value.replace(/\s/g, '');

            if (rawCode.length !== 6) {
                showError('Le code doit contenir 6 chiffres');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'VÉRIFICATION...';

            console.log('[EPscanV Events] Checking code:', rawCode);

            try {
                console.log('[EPscanV Events] Step 1: Checking OPS Events...');
                const opsEventsRef = dbRef(rtdb, 'opsEvents/controllers');
                const opsQuery = rtdbQuery(opsEventsRef, orderByChild('code'), equalTo(rawCode));
                const opsSnapshot = await rtdbGet(opsQuery);
                console.log('[EPscanV Events] OPS Events result:', opsSnapshot.exists());

                if (opsSnapshot.exists()) {
                    const controllers = opsSnapshot.val();
                    const controllerId = Object.keys(controllers)[0];
                    const controller = controllers[controllerId];

                    if (!controller.isActive) {
                        showError('Code désactivé. Mission terminée.');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'VÉRIFIER';
                        return;
                    }

                    sessionStorage.setItem('controller_code', rawCode);
                    sessionStorage.setItem('controller_id', controllerId);
                    sessionStorage.setItem('controller_name', controller.name);
                    sessionStorage.setItem('controller_position', controller.position);
                    sessionStorage.setItem('event_id', controller.eventId);
                    sessionStorage.setItem('controller_type', 'ops_events');

                    console.log('[EPscanV Events] ✅ OPS Events controller authenticated:', controller.name);

                    const eventRef = dbRef(rtdb, `opsEvents/events/${controller.eventId}`);
                    const eventSnapshot = await rtdbGet(eventRef);

                    if (eventSnapshot.exists()) {
                        const event = eventSnapshot.val();
                        sessionStorage.setItem('event_name', event.name);
                        console.log('[EPscanV Events] Event:', event.name);
                    }

                    window.location.href = '/epscanv-events.html';
                    return;
                }

                console.log('[EPscanV Events] Step 2: Checking EvenPass...');
                const evenCodesRef = collection(db, 'agent_access_codes');
                const evenQuery = query(evenCodesRef,
                    where('access_code', '==', rawCode),
                    where('is_active', '==', true)
                );
                const evenSnapshot = await getDocs(evenQuery);
                console.log('[EPscanV Events] EvenPass result:', !evenSnapshot.empty);

                if (!evenSnapshot.empty) {
                    const codeData = evenSnapshot.docs[0].data();

                    sessionStorage.setItem('controller_code', rawCode);
                    sessionStorage.setItem('controller_id', codeData.agent_id);
                    sessionStorage.setItem('controller_name', codeData.agent_name);
                    sessionStorage.setItem('event_id', codeData.event_id);
                    sessionStorage.setItem('event_name', codeData.event_name || 'Événement');
                    sessionStorage.setItem('controller_type', 'evenpass');

                    console.log('[EPscanV Events] ✅ EvenPass controller authenticated:', codeData.agent_name);
                    console.log('[EPscanV Events] Event:', codeData.event_name);

                    window.location.href = '/epscanv-events.html';
                    return;
                }

                console.log('[EPscanV Events] ❌ Code not found in any database');
                showError('Code invalide ou inactif. Vérifiez votre code Events.');
            } catch (error) {
                console.error('[EPscanV Events] ❌ Error:', error);
                console.error('[EPscanV Events] Error details:', error.message, error.code);
                showError(`Erreur: ${error.message || 'Connexion impossible'}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'VÉRIFIER';
            }
        });

        console.log('[EPscanV Events] Login page ready');
    </script>
</body>
</html>
