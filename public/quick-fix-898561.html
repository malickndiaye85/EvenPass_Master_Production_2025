<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIX 898561 - Ré-enrôlement Express</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0A0A0B 0%, #1A1A1B 50%, #0A0A0B 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #1E1E1E;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: #FF4444;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .status {
      background: #0A0A0B;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      min-height: 150px;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .status-line .icon {
      font-size: 18px;
    }

    .progress-bar {
      background: #0A0A0B;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      background: linear-gradient(90deg, #FF4444, #FF6666);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #FF4444, #FF6666);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,68,68,0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success {
      color: #00FF88;
    }

    .error {
      color: #FF4444;
    }

    .warning {
      color: #FFB800;
    }

    .code {
      font-family: 'Courier New', monospace;
      background: #0A0A0B;
      padding: 2px 8px;
      border-radius: 4px;
      color: #00FF88;
    }

    .alert {
      background: #2A0A0A;
      border: 1px solid #FF4444;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Fix Code 898561</h1>
    <p class="subtitle">Ré-enrôlement Express vers Firestore + Realtime DB</p>

    <div class="progress-bar">
      <div class="progress-fill" id="progressBar"></div>
    </div>

    <div class="status" id="statusBox">
      <div class="status-line">
        <span class="icon">⏳</span>
        <span>En attente de démarrage...</span>
      </div>
    </div>

    <button class="btn" id="fixBtn" onclick="startFix()">
      🚀 LANCER LE FIX AUTOMATIQUE
    </button>

    <div class="alert" id="alertBox"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js';
    import { getAuth } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js';
    import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js';
    import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDPsWVCA_Czs64wxiBOqUCSWwbkLMPNjJo",
      authDomain: "evenpasssenegal.firebaseapp.com",
      databaseURL: "https://evenpasssenegal-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "evenpasssenegal",
      storageBucket: "evenpasssenegal.firebasestorage.app",
      messagingSenderId: "882782977052",
      appId: "1:882782977052:web:1f2ea147010066017cf3d9",
      measurementId: "G-FVQTV8TMLJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    window.startFix = async function() {
      const statusBox = document.getElementById('statusBox');
      const progressBar = document.getElementById('progressBar');
      const fixBtn = document.getElementById('fixBtn');
      const alertBox = document.getElementById('alertBox');

      fixBtn.disabled = true;
      alertBox.classList.remove('show');
      statusBox.innerHTML = '';
      progressBar.style.width = '0%';

      const addStatus = (icon, text, type = '') => {
        const line = document.createElement('div');
        line.className = `status-line ${type}`;
        line.innerHTML = `<span class="icon">${icon}</span><span>${text}</span>`;
        statusBox.appendChild(line);
      };

      const setProgress = (percent) => {
        progressBar.style.width = percent + '%';
      };

      const showAlert = (message, isError = false) => {
        alertBox.innerHTML = `<strong>${isError ? '❌' : '✅'} ${isError ? 'ERREUR' : 'SUCCÈS'}</strong><br>${message}`;
        alertBox.classList.add('show');
        alertBox.style.borderColor = isError ? '#FF4444' : '#00FF88';
        alertBox.style.background = isError ? '#2A0A0A' : '#0A2A1A';
      };

      try {
        // ÉTAPE 1: Recherche du véhicule
        addStatus('🔍', 'Recherche du véhicule avec code 898561...');
        setProgress(10);

        const vehiclesRef = ref(db, 'fleet_vehicles');
        const snapshot = await get(vehiclesRef);

        if (!snapshot.exists()) {
          throw new Error('Aucun véhicule trouvé dans fleet_vehicles');
        }

        const vehicles = snapshot.val();
        let targetVehicle = null;
        let targetVehicleId = null;

        for (const [id, vehicle] of Object.entries(vehicles)) {
          if (vehicle.access_code === '898561' || vehicle.epscanv_pin === '898561') {
            targetVehicle = vehicle;
            targetVehicleId = id;
            break;
          }
        }

        if (!targetVehicle) {
          throw new Error('Véhicule avec code 898561 introuvable dans fleet_vehicles');
        }

        addStatus('✅', `Véhicule trouvé: ${targetVehicle.vehicle_number || 'N/A'} (${targetVehicle.license_plate || 'N/A'})`, 'success');
        setProgress(25);

        // ÉTAPE 2: Écriture Firestore access_codes
        addStatus('💾', 'Écriture vers Firestore access_codes/898561...');
        setProgress(40);

        const accessCodeDoc = doc(firestore, 'access_codes', '898561');
        await setDoc(accessCodeDoc, {
          code: '898561',
          type: 'vehicle',
          vehicleId: targetVehicleId,
          vehiclePlate: targetVehicle.license_plate || 'N/A',
          isActive: true,
          createdBy: 'admin',
          createdAt: new Date().toISOString(),
          reEnrolledAt: new Date().toISOString(),
          staffName: `Véhicule ${targetVehicle.vehicle_number || 'N/A'}`,
          usageCount: 0
        });

        addStatus('✅', 'Firestore access_codes/898561 écrit avec succès', 'success');
        setProgress(60);

        // ÉTAPE 3: Écriture Realtime DB fleet_indices/codes
        addStatus('💾', 'Écriture vers Realtime DB fleet_indices/codes/898561...');
        setProgress(75);

        const pinIndexRef = ref(db, 'fleet_indices/codes/898561');
        await set(pinIndexRef, {
          vehicleId: targetVehicleId,
          vehiclePlate: targetVehicle.license_plate || 'N/A',
          isActive: true,
          createdAt: new Date().toISOString(),
          reEnrolledAt: new Date().toISOString(),
          usageCount: 0
        });

        addStatus('✅', 'Realtime DB fleet_indices/codes/898561 écrit avec succès', 'success');
        setProgress(90);

        // ÉTAPE 4: Vérification finale
        addStatus('🔍', 'Vérification finale...');
        setProgress(95);

        const verifyFirestore = await getDoc(accessCodeDoc);
        const verifyRTDB = await get(pinIndexRef);

        if (!verifyFirestore.exists()) {
          throw new Error('Vérification Firestore échouée');
        }

        if (!verifyRTDB.exists()) {
          throw new Error('Vérification Realtime DB échouée');
        }

        addStatus('✅', 'Toutes les vérifications passées !', 'success');
        setProgress(100);

        showAlert(`
          Code <span class="code">898561</span> ré-enrôlé avec succès !<br><br>
          ✅ Firestore: access_codes/898561<br>
          ✅ Realtime DB: fleet_indices/codes/898561<br>
          ✅ Véhicule: ${targetVehicle.vehicle_number || 'N/A'}<br><br>
          <strong>Le code est maintenant prêt pour EPscanT.</strong>
        `);

        setTimeout(() => {
          if (confirm('✅ Fix terminé !\n\nVoulez-vous tester maintenant sur EPscanT ?\n\nVous serez redirigé vers /epscant-login.html')) {
            window.location.href = '/epscant-login.html';
          }
        }, 1000);

      } catch (error) {
        console.error('❌ Erreur:', error);
        addStatus('❌', `ERREUR: ${error.message}`, 'error');
        showAlert(`${error.message}<br><br>Vérifiez la console pour plus de détails.`, true);
        fixBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
