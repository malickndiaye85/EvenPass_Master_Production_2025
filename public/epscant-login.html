<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPscanT - Connexion Transport</title>
    <script src="/env-config.js"></script>
    <link rel="icon" type="image/png" href="/EPSCAN_512x512.png">
    <link rel="apple-touch-icon" href="/EPSCAN_512x512.png">
    <meta name="theme-color" content="#0EA5E9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EPscanT">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #FAFAFA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10%, -10%) rotate(180deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-title {
            font-size: 48px;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #0EA5E9, rgba(14, 165, 233, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 40px rgba(14, 165, 233, 0.3);
        }

        .logo-subtitle {
            font-size: 16px;
            font-weight: 600;
            color: rgba(250, 250, 250, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .logo-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 16px;
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.4);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #0EA5E9;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(14, 165, 233, 0.2);
        }

        .card-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            color: #FAFAFA;
            letter-spacing: 0.5px;
        }

        .card-subtitle {
            font-size: 14px;
            text-align: center;
            color: rgba(250, 250, 250, 0.6);
            margin-bottom: 32px;
            font-weight: 500;
        }

        .pin-input-wrapper {
            margin-bottom: 32px;
        }

        .pin-input {
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(14, 165, 233, 0.3);
            border-radius: 16px;
            font-size: 32px;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            color: #0EA5E9;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        .pin-input:focus {
            background: rgba(14, 165, 233, 0.1);
            border-color: #0EA5E9;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.3);
        }

        .pin-input::placeholder {
            color: rgba(14, 165, 233, 0.3);
            letter-spacing: 4px;
        }

        .pin-input.shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #EF4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #22C55E;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .submit-button {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #0EA5E9, rgba(14, 165, 233, 0.8));
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
            margin-bottom: 16px;
        }

        .submit-button:hover {
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.5);
            transform: translateY(-2px);
        }

        .submit-button:active {
            transform: scale(0.98);
        }

        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-button {
            width: 100%;
            height: 48px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #EF4444;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .clear-button:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: #EF4444;
        }

        .clear-button:active {
            transform: scale(0.98);
        }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(14, 165, 233, 0.2);
            border-top-color: #0EA5E9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        .loading-spinner.show {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .firebase-status {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(250, 250, 250, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 100;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.connected {
            background: #22C55E;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        .status-dot.disconnected {
            background: #EF4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .help-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #0EA5E9, rgba(14, 165, 233, 0.8));
            border: none;
            border-radius: 50%;
            color: #FFFFFF;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 100;
        }

        .help-button:hover {
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.6);
            transform: scale(1.05);
        }

        .help-button:active {
            transform: scale(0.95);
        }

        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(250, 250, 250, 0.5);
        }

        .footer-links a {
            color: #0EA5E9;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: rgba(14, 165, 233, 0.8);
        }
    </style>
</head>
<body>
    <div class="firebase-status">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">Connexion...</span>
    </div>

    <div class="container">
        <div class="logo-section">
            <div class="logo-title">EPscanT</div>
            <div class="logo-subtitle">Scanner Transport</div>
            <div class="logo-badge">● DEM-DEM Express</div>
        </div>

        <div class="login-card">
            <h1 class="card-title">Connexion Contrôleur</h1>
            <p class="card-subtitle">Saisissez votre code d'accès à 6 chiffres</p>

            <div class="loading-spinner" id="loadingSpinner"></div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="pin-input-wrapper">
                <input
                    type="tel"
                    id="pinInput"
                    class="pin-input"
                    placeholder="••••••"
                    maxlength="6"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    autocomplete="off"
                    autofocus
                />
            </div>

            <button class="submit-button" id="submitButton" disabled>
                Valider
            </button>

            <button class="clear-button" id="clearButton">
                Effacer
            </button>

            <div class="footer-links">
                Besoin d'aide ? <a href="#" id="helpLink">Contactez le support</a>
            </div>
        </div>
    </div>

    <button class="help-button" id="helpButton" title="Aide">?</button>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js';
        import { getDatabase, ref as dbRef, get as rtdbGet } from 'https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: window.__FIREBASE_CONFIG__?.apiKey || "AIzaSyDPsWVCA_Czs64wxiBOqUCSWwbkLMPNjJo",
            authDomain: window.__FIREBASE_CONFIG__?.authDomain || "evenpasssenegal.firebaseapp.com",
            databaseURL: window.__FIREBASE_CONFIG__?.databaseURL || "https://evenpasssenegal-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: window.__FIREBASE_CONFIG__?.projectId || "evenpasssenegal",
            storageBucket: window.__FIREBASE_CONFIG__?.storageBucket || "evenpasssenegal.firebasestorage.app",
            messagingSenderId: window.__FIREBASE_CONFIG__?.messagingSenderId || "882782977052",
            appId: window.__FIREBASE_CONFIG__?.appId || "1:882782977052:web:1f2ea147010066017cf3d9"
        };

        const app = initializeApp(firebaseConfig);
        const rtdb = getDatabase(app);

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        let isFirebaseConnected = false;

        (async function testFirebaseConnection() {
            try {
                console.log('[EPscanT Login] Testing Firebase connection...');
                const testRef = dbRef(rtdb, '_connection_test/test');
                await rtdbGet(testRef);
                isFirebaseConnected = true;
                statusDot.classList.remove('disconnected');
                statusDot.classList.add('connected');
                statusText.textContent = 'Connecté';
                console.log('[EPscanT Login] ✅ Firebase connected');
            } catch (error) {
                isFirebaseConnected = false;
                statusDot.classList.remove('connected');
                statusDot.classList.add('disconnected');
                statusText.textContent = 'Hors ligne';
                console.error('[EPscanT Login] ❌ Firebase connection failed:', error);
            }
        })();

        const pinInput = document.getElementById('pinInput');
        const submitButton = document.getElementById('submitButton');
        const clearButton = document.getElementById('clearButton');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');

            pinInput.classList.add('shake');

            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 100]);
            }

            setTimeout(() => {
                pinInput.classList.remove('shake');
            }, 500);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');

            if (navigator.vibrate) {
                navigator.vibrate([50, 100, 50]);
            }
        }

        function clearMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        async function authenticateVehicle(pinCode) {
            console.log('[EPscanT Login] Authenticating with PIN:', pinCode);

            try {
                const vehiclesRef = dbRef(rtdb, 'transport/vehicles');
                const snapshot = await rtdbGet(vehiclesRef);

                if (!snapshot.exists()) {
                    console.warn('[EPscanT Login] No vehicles in database');
                    return {
                        success: false,
                        error: 'Aucun véhicule enregistré'
                    };
                }

                const vehicles = snapshot.val();
                let foundVehicle = null;
                let foundVehicleId = null;

                for (const [vehicleId, vehicleData] of Object.entries(vehicles)) {
                    if (vehicleData.pin === pinCode && vehicleData.isActive) {
                        foundVehicle = vehicleData;
                        foundVehicleId = vehicleId;
                        break;
                    }
                }

                if (!foundVehicle) {
                    return {
                        success: false,
                        error: 'Code d\'accès incorrect ou véhicule inactif'
                    };
                }

                const sessionData = {
                    vehicleId: foundVehicleId,
                    driverName: foundVehicle.driverName,
                    licensePlate: foundVehicle.licensePlate,
                    loginTime: Date.now()
                };

                localStorage.setItem('demdem_vehicle_session', JSON.stringify(sessionData));

                const sessionRef = dbRef(rtdb, `transport/sessions/${foundVehicleId}`);
                await rtdbGet(sessionRef);

                console.log('[EPscanT Login] ✅ Authentication successful:', foundVehicle.driverName);

                return {
                    success: true,
                    vehicleId: foundVehicleId,
                    driverName: foundVehicle.driverName,
                    licensePlate: foundVehicle.licensePlate
                };
            } catch (error) {
                console.error('[EPscanT Login] Firebase error:', error);
                return {
                    success: false,
                    error: 'Erreur de connexion à la base de données'
                };
            }
        }

        async function handlePinSubmit() {
            const pin = pinInput.value.trim();

            if (pin.length !== 6) return;

            clearMessages();
            loadingSpinner.classList.add('show');
            submitButton.disabled = true;
            pinInput.disabled = true;
            clearButton.disabled = true;

            try {
                const result = await authenticateVehicle(pin);

                if (result.success) {
                    showSuccess(`Bienvenue ${result.driverName} !`);

                    setTimeout(() => {
                        window.location.href = '/epscant-transport.html';
                    }, 1000);
                } else {
                    showError(result.error);

                    setTimeout(() => {
                        pinInput.value = '';
                        pinInput.disabled = false;
                        clearButton.disabled = false;
                        submitButton.disabled = true;
                        clearMessages();
                        loadingSpinner.classList.remove('show');
                        pinInput.focus();
                    }, 1500);
                }
            } catch (error) {
                console.error('[EPscanT Login] Error:', error);
                showError('Erreur de connexion');

                setTimeout(() => {
                    pinInput.value = '';
                    pinInput.disabled = false;
                    clearButton.disabled = false;
                    submitButton.disabled = true;
                    clearMessages();
                    loadingSpinner.classList.remove('show');
                    pinInput.focus();
                }, 1500);
            }
        }

        pinInput.addEventListener('input', (e) => {
            const value = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = value;

            submitButton.disabled = value.length !== 6;
            clearMessages();
        });

        pinInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && pinInput.value.length === 6) {
                handlePinSubmit();
            }
        });

        submitButton.addEventListener('click', handlePinSubmit);

        clearButton.addEventListener('click', () => {
            pinInput.value = '';
            submitButton.disabled = true;
            clearMessages();
            pinInput.focus();
        });

        function openWhatsAppSupport() {
            const message = encodeURIComponent('Bonjour, j\'ai besoin d\'aide pour me connecter à EPscanT (Transport Scanner)');
            window.open(`https://wa.me/221781234567?text=${message}`, '_blank');
        }

        document.getElementById('helpButton').addEventListener('click', openWhatsAppSupport);
        document.getElementById('helpLink').addEventListener('click', (e) => {
            e.preventDefault();
            openWhatsAppSupport();
        });

        console.log('[EPscanT Login] Ready');
    </script>
</body>
</html>
